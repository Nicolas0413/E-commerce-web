<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Kablau</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="navbar">
        <a href="index.html"><img id="logo" src="Img/kablau.png" alt="logo da loja kablau"></a>
        <a href="index.html" class="btn_comprar">Voltar para a loja</a>
    </div>

    <div id="cadastro" class="login_container">

        <form class="login_card">

            <h2>Cadastre-se na Kablau</h2>

            <label>Nome</label>
            <input type="text" placeholder="Digite seu nome completo" required>

            <label>Usuário</label>
            <input type="text" placeholder="Digite seu login" required>

            <label>Senha</label>
            <input type="password" placeholder="Digite sua senha" minlength="4" required>

            <label>CPF</label>
            <input type="text" placeholder="Digite seu cpf (apenas números)" maxlength="11" required>

            <label>Data de nascimento</label>
            <input type="date" required>

            <label>Email</label>
            <input type="email" placeholder="Digite seu email" required>

            <button type="submit" class="btn_comprar">
                Entrar
            </button>

            <span>Já está cadastrado? <a href="login.html">Fazer login</a></span>
        </form>

    </div>

</body>
</html>
