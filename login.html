<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kablau</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR (MESMO HEADER) -->
    <div id="navbar">
        <img id="logo" src="Img/kablau.png" alt="logo">
        <a href="index.html" class="btn_comprar">Voltar para a loja</a>
    </div>

    <!-- FORM LOGIN -->
    <div class="login_container">

        <form class="login_card">

            <h2>Entrar na Kablau</h2>

            <label>Usuário</label>
            <input type="text" placeholder="Digite seu login" required>

            <label>Senha</label>
            <input type="password" placeholder="Digite sua senha" minlength="4" required>

            <button type="submit" class="btn_comprar">
                Entrar
            </button>
            <span>Novo na Kablau? <a href="cadastro.html">Cadastrar-se</a></span>
        </form>

    </div>

</body>
</html>
